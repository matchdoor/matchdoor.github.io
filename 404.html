<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>Matchdoor — กำลังโหลด...</title>
<script>
  // ======================================================
  // GitHub Pages SPA Redirect Fix
  // เมื่อ user refresh หน้า /listings หรือ /agents ฯลฯ
  // GitHub Pages จะ serve 404.html แทน
  // Script นี้จะเข้ารหัส URL แล้ว redirect กลับไป /
  // แล้ว index.html จะอ่าน URL กลับมาแสดงหน้าที่ถูกต้อง
  // ======================================================
  (function() {
    var l = window.location;
    // เก็บ path + search + hash ทั้งหมดไว้ใน query string
    // แล้ว redirect ไปที่ root /
    var segmentCount = 0;
    var path = l.pathname.slice(1).split('/').slice(segmentCount).join('/').replace(/&/g, '~and~');
    var search = l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '';
    var hash = l.hash ? l.hash : '';
    var redirectUrl = l.protocol + '//' + l.host + l.pathname.split('/').slice(0, 1 + segmentCount).join('/') + '/?/' + path + search + hash;
    l.replace(redirectUrl);
  })();
</script>
</head>
<body>
  <p style="font-family:sans-serif;text-align:center;margin-top:80px;color:#666">กำลังโหลด...</p>
</body>
</html>
